{% extends 'shop/base.html' %}

{% block content %}
<h1>Products</h1>
<p><a href="{% url 'product_create' %}">Create Product</a></p>
<ul>
    {% for product in products %}
        <li>
            <a href="{% url 'product_detail' product.pk %}">{{ product.name }}</a>
            - ${{ product.price }}
        </li>
    {% empty %}
        <li>No products available.</li>
    {% endfor %}
</ul>
{% endblock %}
